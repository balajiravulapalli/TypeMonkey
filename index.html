<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeMonkey — PDF Typing Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --text: #e8e8e8;
    --muted: #555;
    --correct: #4ade80;
    --wrong: #ff4444;
    --cursor: #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent2); }

  .tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Upload Zone */
  #upload-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }
  #upload-zone:hover, #upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(245,200,66,0.04);
  }
  #upload-zone::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(245,200,66,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .upload-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .upload-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .upload-sub { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; }
  #file-input { display: none; }

  /* Stats bar */
  #stats-bar {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 1.5rem 0;
  }
  .stat { background: var(--surface); padding: 1rem 1.5rem; text-align: center; }
  .stat-val {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
    font-family: 'Playfair Display', serif;
  }
  .stat-val.countdown-warn { color: var(--wrong) !important; }
  .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* Section title */
  .section-title {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* PDF section */
  #pdf-section { display: none; margin: 1.5rem 0; }
  #pdf-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  #pdf-canvas {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    display: block;
    max-height: 350px;
    object-fit: contain;
  }

  /* Buttons */
  button {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  button.primary:hover { background: #e0b430; color: #000; }

  /* Number inputs */
  .num-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 0.38rem 0.5rem;
    border-radius: 3px;
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }
  .num-input:focus { border-color: var(--accent); }
  .num-input.error-flash { border-color: var(--wrong); }

  #page-info { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

  /* Timer section */
  #timer-section {
    display: none;
    margin: 1.2rem 0;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .timer-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .timer-btn { padding: 0.42rem 1rem; font-size: 0.72rem; letter-spacing: 1px; }
  .timer-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .timer-btn.active:hover { background: #e0b430; }
  .timer-divider { width: 1px; height: 22px; background: var(--border); margin: 0 0.1rem; }

  /* Typing area */
  #typing-section { display: none; margin: 1.5rem 0; }
  #text-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    font-size: 1rem;
    line-height: 2;
    min-height: 100px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 1rem;
    word-break: break-word;
  }
  .char { color: var(--muted); position: relative; }
  .char.correct { color: var(--correct); }
  .char.wrong { color: var(--wrong); background: rgba(255,68,68,0.15); border-radius: 2px; }
  .char.cursor::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--cursor);
    animation: blink 0.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  #typing-input {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 1rem 1.2rem;
    border-radius: 4px;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    min-height: 80px;
  }
  #typing-input:focus { border-color: var(--accent); }
  #typing-input.error { border-color: var(--wrong); }
  #typing-input:disabled { opacity: 0.45; cursor: not-allowed; }

  .controls-row {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Progress */
  #progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin: 1rem 0; overflow: hidden; display: none; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s ease; width: 0%; }

  /* Mode tabs */
  .mode-tabs { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
  .mode-tab { flex: 1; border: none; border-radius: 0; border-right: 1px solid var(--border); padding: 0.7rem; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; }
  .mode-tab:last-child { border-right: none; }
  .mode-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .mode-tab.active:hover { background: #e0b430; color: #000; }

  /* Complete screen */
  #complete-screen { display: none; text-align: center; padding: 3rem 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
  .complete-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
  .complete-stats { display: flex; justify-content: center; gap: 3rem; margin: 2rem 0; }
  .cs-item { text-align: center; }
  .cs-val { font-size: 2rem; font-family: 'Playfair Display', serif; color: var(--accent2); }
  .cs-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* Manual section */
  #manual-section { display: none; margin: 1.5rem 0; }
  #manual-text { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; padding: 1rem; border-radius: 4px; outline: none; resize: vertical; min-height: 120px; }
  #manual-text:focus { border-color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Type<span>Monkey</span></div>
    <div class="tagline">PDF Typing Practice</div>
  </div>
  <div style="display:flex;gap:0.8rem;align-items:center;">
    <button onclick="resetAll()">↺ Reset</button>
    <button onclick="document.getElementById('file-input').click()" class="primary">+ Upload PDF</button>
  </div>
</header>

<main>

  <!-- Mode Tabs -->
  <div class="mode-tabs" id="mode-tabs">
    <button class="mode-tab active" onclick="setMode('pdf')" id="tab-pdf">📄 PDF Mode</button>
    <button class="mode-tab" onclick="setMode('manual')" id="tab-manual">✍️ Manual Text</button>
  </div>

  <!-- Upload Zone -->
  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <span class="upload-icon">⌨️</span>
    <div class="upload-title">Drop your PDF here</div>
    <div class="upload-sub">or click to browse · PDF files only</div>
  </div>
  <input type="file" id="file-input" accept=".pdf" onchange="handleFile(event)">

  <!-- Manual Text Section -->
  <div id="manual-section">
    <div class="section-title">Enter Text to Practice</div>
    <textarea id="manual-text" placeholder="Paste or type any text here to practice typing..."></textarea>
    <div class="controls-row">
      <button class="primary" onclick="startManualTyping()">Start Typing ▶</button>
    </div>
  </div>

  <!-- PDF Section -->
  <div id="pdf-section">
    <div class="section-title">PDF Preview</div>
    <div id="pdf-controls">
      <button onclick="prevPage()">← Prev</button>
      <span id="page-info">Page 1 / 1</span>
      <button onclick="nextPage()">Next →</button>

      <!-- Manual page number input -->
      <div style="display:flex;align-items:center;gap:0.4rem;margin-left:0.3rem;">
        <span style="font-size:0.65rem;color:var(--muted);letter-spacing:1px;">GO TO</span>
        <input id="page-jump-input" type="number" min="1" value="1" class="num-input" style="width:60px;"
          onkeydown="if(event.key==='Enter')jumpToPage()" />
        <button onclick="jumpToPage()">Go</button>
      </div>

      <button class="primary" onclick="startTypingFromPage()" style="margin-left:auto;">Type This Page ▶</button>
      <button onclick="document.getElementById('file-input').click()">Change PDF</button>
    </div>
    <canvas id="pdf-canvas"></canvas>
  </div>

  <!-- Timer Mode (shown when PDF loaded or manual mode) -->
  <div id="timer-section">
    <div class="section-title">⏱ Timer Mode</div>
    <div class="timer-row">
      <button class="timer-btn active" onclick="selectTimer('free')" id="tbtn-free">∞ Free</button>
      <button class="timer-btn" onclick="selectTimer(15)" id="tbtn-15">15s</button>
      <button class="timer-btn" onclick="selectTimer(30)" id="tbtn-30">30s</button>
      <button class="timer-btn" onclick="selectTimer(60)" id="tbtn-60">60s</button>
      <div class="timer-divider"></div>
      <span style="font-size:0.65rem;color:var(--muted);letter-spacing:1px;">CUSTOM</span>
      <input id="custom-timer-input" type="number" min="5" max="600" placeholder="sec" class="num-input" style="width:70px;"
        onkeydown="if(event.key==='Enter')applyCustomTimer()" />
      <button onclick="applyCustomTimer()">Set</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div id="stats-bar">
    <div class="stat"><span class="stat-val" id="s-wpm">0</span><span class="stat-label">WPM</span></div>
    <div class="stat"><span class="stat-val" id="s-acc">100%</span><span class="stat-label">Accuracy</span></div>
    <div class="stat"><span class="stat-val" id="s-time">0s</span><span class="stat-label" id="stat-time-label">Time</span></div>
    <div class="stat"><span class="stat-val" id="s-chars">0</span><span class="stat-label">Chars</span></div>
  </div>

  <!-- Progress -->
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <!-- Typing Section -->
  <div id="typing-section">
    <div class="section-title">Type the Text Below</div>
    <div id="text-display"></div>
    <textarea id="typing-input" placeholder="Start typing here..." oninput="handleTyping()" onkeydown="handleKeydown(event)"></textarea>
    <div class="controls-row">
      <button onclick="restartTyping()">↺ Restart</button>
      <button onclick="goBack()">← Back</button>
      <span id="typing-hint" style="font-size:0.7rem;color:var(--muted);margin-left:auto;">Press any key to begin</span>
    </div>
  </div>

  <!-- Complete Screen -->
  <div id="complete-screen">
    <div class="complete-title" id="complete-title">🎉 Done!</div>
    <p style="color:var(--muted);font-size:0.8rem;letter-spacing:2px;" id="complete-sub">TYPING COMPLETE</p>
    <div class="complete-stats">
      <div class="cs-item"><div class="cs-val" id="f-wpm">0</div><div class="cs-label">WPM</div></div>
      <div class="cs-item"><div class="cs-val" id="f-acc">0%</div><div class="cs-label">Accuracy</div></div>
      <div class="cs-item"><div class="cs-val" id="f-time">0s</div><div class="cs-label">Time</div></div>
    </div>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <button class="primary" onclick="restartTyping()">Try Again</button>
      <button onclick="goBack()">← Back</button>
      <button onclick="resetAll()">New PDF</button>
    </div>
  </div>

</main>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ────────────────────────────────────────────────────────────────
  let pdfDoc = null, currentPage = 1, totalPages = 0;
  let targetText = '', typedIndex = 0;
  let startTime = null;
  let timerInterval = null;   // for free-mode elapsed ticker
  let countdownInterval = null; // for countdown
  let totalTyped = 0, totalErrors = 0;
  let currentMode = 'pdf';
  let timerMode = 'free';     // 'free' | number (seconds)
  let countdownLeft = 0;

  // ── Drag & Drop ──────────────────────────────────────────────────────────
  const uploadZone = document.getElementById('upload-zone');
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadPDF(f);
  });

  // ── Mode tabs ────────────────────────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('tab-pdf').classList.toggle('active', mode === 'pdf');
    document.getElementById('tab-manual').classList.toggle('active', mode === 'manual');
    document.getElementById('upload-zone').style.display = mode === 'pdf' ? 'block' : 'none';
    document.getElementById('manual-section').style.display = mode === 'manual' ? 'block' : 'none';
    document.getElementById('timer-section').style.display = mode === 'manual' ? 'block' : 'none';
    document.getElementById('pdf-section').style.display = 'none';
    document.getElementById('typing-section').style.display = 'none';
    document.getElementById('complete-screen').style.display = 'none';
    document.getElementById('stats-bar').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
  }

  // ── PDF loading ──────────────────────────────────────────────────────────
  function handleFile(e) {
    const f = e.target.files[0];
    if (f) loadPDF(f);
  }

  async function loadPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('pdf-section').style.display = 'block';
    document.getElementById('timer-section').style.display = 'block';
    const jump = document.getElementById('page-jump-input');
    jump.max = totalPages;
    jump.value = 1;
    renderPage(currentPage);
  }

  async function renderPage(num) {
    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale: 1.4 });
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    await page.render({ canvasContext: ctx, viewport }).promise;
    document.getElementById('page-info').textContent = `Page ${num} / ${totalPages}`;
    document.getElementById('page-jump-input').value = num;
  }

  function prevPage() {
    if (currentPage > 1) { currentPage--; renderPage(currentPage); }
  }

  function nextPage() {
    if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
  }

  function jumpToPage() {
    const input = document.getElementById('page-jump-input');
    const n = parseInt(input.value);
    if (!n || n < 1 || n > totalPages) {
      input.classList.add('error-flash');
      setTimeout(() => input.classList.remove('error-flash'), 900);
      return;
    }
    currentPage = n;
    renderPage(currentPage);
  }

  // ── Timer mode selection ─────────────────────────────────────────────────
  function selectTimer(mode) {
    timerMode = mode;
    ['free', 15, 30, 60].forEach(m => {
      const el = document.getElementById('tbtn-' + m);
      if (el) el.classList.toggle('active', m === mode);
    });
    document.getElementById('custom-timer-input').style.borderColor = '';
  }

  function applyCustomTimer() {
    const input = document.getElementById('custom-timer-input');
    const val = parseInt(input.value);
    if (!val || val < 5) {
      input.classList.add('error-flash');
      setTimeout(() => input.classList.remove('error-flash'), 900);
      return;
    }
    timerMode = val;
    ['free', 15, 30, 60].forEach(m => {
      const el = document.getElementById('tbtn-' + m);
      if (el) el.classList.remove('active');
    });
    input.style.borderColor = 'var(--accent)';
  }

  // ── Text extraction ──────────────────────────────────────────────────────
  async function startTypingFromPage() {
    const page = await pdfDoc.getPage(currentPage);
    const content = await page.getTextContent();
    const raw = content.items.map(i => i.str).join(' ');
    const text = raw
      .replace(/[^\x20-\x7E\n]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
    if (!text) { alert('No readable text on this page. Try another page.'); return; }
    startTypingSession(text);
  }

  function startManualTyping() {
    const text = document.getElementById('manual-text').value.trim();
    if (!text) { alert('Please enter some text first.'); return; }
    startTypingSession(text);
  }

  // ── Start session ────────────────────────────────────────────────────────
  function startTypingSession(text) {
    targetText = text;
    typedIndex = 0;
    totalTyped = 0;
    totalErrors = 0;
    startTime = null;
    clearInterval(timerInterval);
    clearInterval(countdownInterval);

    // Hide everything, show typing area
    ['pdf-section','manual-section','upload-zone','complete-screen','timer-section'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    document.getElementById('typing-section').style.display = 'block';
    document.getElementById('stats-bar').style.display = 'grid';
    document.getElementById('progress-wrap').style.display = 'block';

    // Configure time stat
    const sTime = document.getElementById('s-time');
    sTime.classList.remove('countdown-warn');
    document.getElementById('stat-time-label').textContent = timerMode === 'free' ? 'Time' : 'Left';
    sTime.textContent = timerMode === 'free' ? '0s' : timerMode + 's';

    const input = document.getElementById('typing-input');
    input.value = '';
    input.disabled = false;
    input.focus();
    renderTextDisplay();
    updateWpmAcc();
  }

  // ── Render characters ────────────────────────────────────────────────────
  function renderTextDisplay() {
    const display = document.getElementById('text-display');
    const typed = document.getElementById('typing-input').value;
    let html = '';
    for (let i = 0; i < targetText.length; i++) {
      const ch = targetText[i] === '\n' ? '↵\n' : targetText[i];
      if (i < typed.length) {
        const ok = typed[i] === targetText[i];
        html += `<span class="char ${ok ? 'correct' : 'wrong'}">${esc(ch)}</span>`;
      } else if (i === typedIndex) {
        html += `<span class="char cursor">${esc(ch)}</span>`;
      } else {
        html += `<span class="char">${esc(ch)}</span>`;
      }
    }
    display.innerHTML = html;
    const cursor = display.querySelector('.cursor');
    if (cursor) cursor.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    const pct = Math.min(100, (typedIndex / targetText.length) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/ /g,'&nbsp;');
  }

  // ── Input events ─────────────────────────────────────────────────────────
  function handleTyping() {
    const input = document.getElementById('typing-input');
    const typed = input.value;
    typedIndex = typed.length;

    if (!startTime && typed.length > 0) {
      startTime = Date.now();

      if (timerMode === 'free') {
        timerInterval = setInterval(updateFreeTime, 500);
      } else {
        // Countdown
        countdownLeft = timerMode;
        countdownInterval = setInterval(() => {
          countdownLeft--;
          const sTime = document.getElementById('s-time');
          sTime.textContent = countdownLeft + 's';
          if (countdownLeft <= 5) sTime.classList.add('countdown-warn');
          if (countdownLeft <= 0) {
            clearInterval(countdownInterval);
            finishSession(true);
          }
        }, 1000);
      }
    }

    let errors = 0;
    for (let i = 0; i < typed.length; i++) {
      if (typed[i] !== targetText[i]) errors++;
    }
    totalTyped = typed.length;
    totalErrors = errors;

    input.classList.toggle('error',
      errors > 0 && typed.length > 0 && typed[typed.length-1] !== targetText[typed.length-1]);

    renderTextDisplay();
    updateWpmAcc();

    if (typed === targetText) finishSession(false);
  }

  function handleKeydown(e) {
    if (e.key === 'Tab') e.preventDefault();
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateFreeTime() {
    const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
    document.getElementById('s-time').textContent = Math.round(elapsed) + 's';
  }

  function updateWpmAcc() {
    const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
    const minutes = elapsed / 60;
    const wpm = minutes > 0 ? Math.round((totalTyped / 5) / minutes) : 0;
    const acc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;
    document.getElementById('s-wpm').textContent = wpm;
    document.getElementById('s-acc').textContent = acc + '%';
    document.getElementById('s-chars').textContent = typedIndex;
  }

  // ── Finish ────────────────────────────────────────────────────────────────
  function finishSession(timeUp) {
    clearInterval(timerInterval);
    clearInterval(countdownInterval);

    const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
    const wpm = elapsed > 0 ? Math.round((totalTyped / 5) / (elapsed / 60)) : 0;
    const acc = totalTyped > 0 ? Math.round(((totalTyped - totalErrors) / totalTyped) * 100) : 100;
    const displayTime = timerMode === 'free' ? Math.round(elapsed) + 's' : timerMode + 's';

    document.getElementById('f-wpm').textContent = wpm;
    document.getElementById('f-acc').textContent = acc + '%';
    document.getElementById('f-time').textContent = displayTime;

    if (timeUp) {
      document.getElementById('complete-title').textContent = '⏰ Time\'s Up!';
      document.getElementById('complete-sub').textContent = 'TIMER EXPIRED';
      document.getElementById('typing-input').disabled = true;
    } else {
      document.getElementById('complete-title').textContent = '🎉 Done!';
      document.getElementById('complete-sub').textContent = 'TYPING COMPLETE';
      document.getElementById('progress-bar').style.width = '100%';
    }

    document.getElementById('typing-section').style.display = 'none';
    document.getElementById('complete-screen').style.display = 'block';
  }

  function restartTyping() {
    document.getElementById('complete-screen').style.display = 'none';
    startTypingSession(targetText);
  }

  function goBack() {
    clearInterval(timerInterval);
    clearInterval(countdownInterval);
    document.getElementById('typing-section').style.display = 'none';
    document.getElementById('complete-screen').style.display = 'none';
    document.getElementById('stats-bar').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    if (currentMode === 'pdf' && pdfDoc) {
      document.getElementById('pdf-section').style.display = 'block';
      document.getElementById('timer-section').style.display = 'block';
    } else {
      document.getElementById('manual-section').style.display = 'block';
      document.getElementById('timer-section').style.display = 'block';
    }
  }

  function resetAll() {
    clearInterval(timerInterval);
    clearInterval(countdownInterval);
    pdfDoc = null; currentPage = 1; totalPages = 0; targetText = '';
    document.getElementById('file-input').value = '';
    document.getElementById('manual-text') && (document.getElementById('manual-text').value = '');
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('s-time').classList.remove('countdown-warn');
    setMode(currentMode);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  setMode('pdf');
</script>
</body>
</html>
